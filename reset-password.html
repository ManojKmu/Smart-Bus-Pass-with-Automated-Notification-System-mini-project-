<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password - Smart Bus</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='forgot.css') }}" />
  <style>
    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      border: 1px solid #c3e6cb;
    }
    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      border: 1px solid #f5c6cb;
    }
    .password-requirements {
      background: #e3f2fd;
      color: #1976d2;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      border: 1px solid #bbdefb;
      font-size: 14px;
    }
    .password-strength {
      margin-top: 5px;
      height: 5px;
      border-radius: 3px;
      background: #e0e0e0;
    }
    .strength-weak { background: #f44336; }
    .strength-medium { background: #ff9800; }
    .strength-strong { background: #4caf50; }
    .show-password {
      margin-top: 10px;
      font-size: 14px;
    }
    .show-password input {
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <a href="{{ url_for('index') }}" class="back-link">← Back to sign in</a>
    <h2>Set New Password</h2>
    <p>Enter your email and choose a new password</p>
    
    {% if success %}
    <div class="success-message">
      {{ success }}
    </div>
    {% endif %}
    
    {% if error %}
    <div class="error-message">
      {{ error }}
    </div>
    {% endif %}
    
    <div class="password-requirements">
      <strong>Password Requirements:</strong>
      <ul style="margin: 10px 0 0 20px;">
        <li>At least 6 characters long</li>
        <li>Contains letters and numbers</li>
        <li>Easy to remember for you</li>
      </ul>
    </div>
    
    <form action="{{ url_for('set_new_password') }}" method="POST" id="resetForm">
      <input type="hidden" name="token" value="{{ token }}" />
      
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" value="{{ email }}" readonly style="background: #f5f5f5; color: #666;" />
      
      <label for="new_password">New Password:</label>
      <input type="password" id="new_password" name="new_password" placeholder="Enter new password" required minlength="6" />
      <div class="password-strength" id="passwordStrength"></div>
      
      <label for="confirm_password">Confirm New Password:</label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required minlength="6" />
      
      <div class="show-password">
        <input type="checkbox" id="showPassword" onchange="togglePasswordVisibility()">
        <label for="showPassword">Show passwords</label>
      </div>
      
      <button type="submit" id="submitBtn">Update Password</button>
    </form>
  </div>

  <script>
    function togglePasswordVisibility() {
      const newPassword = document.getElementById('new_password');
      const confirmPassword = document.getElementById('confirm_password');
      const showPassword = document.getElementById('showPassword');
      
      if (showPassword.checked) {
        newPassword.type = 'text';
        confirmPassword.type = 'text';
      } else {
        newPassword.type = 'password';
        confirmPassword.type = 'password';
      }
    }

    function checkPasswordStrength(password) {
      const strengthBar = document.getElementById('passwordStrength');
      let strength = 0;
      
      if (password.length >= 6) strength++;
      if (password.match(/[a-zA-Z]/)) strength++;
      if (password.match(/[0-9]/)) strength++;
      if (password.match(/[^a-zA-Z0-9]/)) strength++;
      
      strengthBar.className = 'password-strength';
      if (strength <= 1) {
        strengthBar.classList.add('strength-weak');
      } else if (strength <= 2) {
        strengthBar.classList.add('strength-medium');
      } else {
        strengthBar.classList.add('strength-strong');
      }
    }

    document.getElementById('new_password').addEventListener('input', function(e) {
      checkPasswordStrength(e.target.value);
    });

    document.getElementById('resetForm').addEventListener('submit', function(e) {
      const email = document.getElementById('email').value.trim();
      const newPassword = document.getElementById('new_password').value;
      const confirmPassword = document.getElementById('confirm_password').value;
      const submitBtn = document.getElementById('submitBtn');
      
      if (!email) {
        e.preventDefault();
        alert('Email is required');
        return;
      }
      
      if (newPassword.length < 6) {
        e.preventDefault();
        alert('Password must be at least 6 characters long');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        e.preventDefault();
        alert('Passwords do not match. Please try again.');
        return;
      }
      
      // Show loading state
      submitBtn.textContent = 'Updating Password...';
      submitBtn.disabled = true;
    });
  </script>
</body>
</html>
