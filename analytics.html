<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bus Analytics Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .analytics-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .stat-icon.users { color: #4CAF50; }
        .stat-icon.visits { color: #2196F3; }
        .stat-icon.active { color: #ff9800; }
        .stat-icon.today { color: #9c27b0; }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 1.1em;
        }

        .charts-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .chart-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .users-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .users-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: background 0.3s ease;
        }

        .user-item:hover {
            background: #f8f9fa;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .user-details h4 {
            margin: 0;
            color: #333;
        }

        .user-details p {
            margin: 0;
            color: #666;
            font-size: 0.9em;
        }

        .user-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .status-online {
            background: #e8f5e8;
            color: #4CAF50;
        }

        .status-offline {
            background: #ffebee;
            color: #f44336;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #4CAF50;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .loading i {
            font-size: 3em;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="analytics-container">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> Smart Bus Analytics</h1>
            <p>Real-time website usage and user analytics</p>
        </div>

        <div id="loadingIndicator" class="loading">
            <i class="fas fa-spinner"></i>
            <h3>Loading Analytics Data...</h3>
        </div>

        <div id="analyticsContent" style="display: none;">
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon users">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-value" id="totalUsers">0</div>
                    <div class="stat-label">Total Users</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon visits">
                        <i class="fas fa-eye"></i>
                    </div>
                    <div class="stat-value" id="totalVisits">0</div>
                    <div class="stat-label">Total Visits</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon active">
                        <i class="fas fa-user-clock"></i>
                    </div>
                    <div class="stat-value" id="activeUsers">0</div>
                    <div class="stat-label">Active Users (24h)</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon today">
                        <i class="fas fa-calendar-day"></i>
                    </div>
                    <div class="stat-value" id="todayVisits">0</div>
                    <div class="stat-label">Today's Visits</div>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="charts-section">
                <div class="chart-card">
                    <h3 class="chart-title">Recent Login Activity</h3>
                    <div id="loginChart">
                        <div id="recentLogins"></div>
                    </div>
                </div>

                <div class="chart-card">
                    <h3 class="chart-title">Daily Statistics</h3>
                    <div id="dailyStats"></div>
                </div>
            </div>

            <!-- Active Users Section -->
            <div class="users-section">
                <h3 class="section-title">
                    <i class="fas fa-users"></i>
                    Active Users
                </h3>
                <div class="users-list" id="usersList">
                    <!-- Users will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadAnalytics()" title="Refresh Data">
        <i class="fas fa-sync-alt"></i>
    </button>

    <script>
        let analyticsData = {};

        async function loadAnalytics() {
            try {
                document.getElementById('loadingIndicator').style.display = 'block';
                document.getElementById('analyticsContent').style.display = 'none';

                const response = await fetch('/api/analytics');
                const result = await response.json();

                if (result.success) {
                    analyticsData = result.data;
                    updateDashboard();
                    document.getElementById('loadingIndicator').style.display = 'none';
                    document.getElementById('analyticsContent').style.display = 'block';
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Error loading analytics:', error);
                document.getElementById('loadingIndicator').innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="color: #f44336;"></i>
                    <h3>Error Loading Data</h3>
                    <p>${error.message}</p>
                `;
            }
        }

        function updateDashboard() {
            // Update stat cards
            document.getElementById('totalUsers').textContent = analyticsData.total_unique_users;
            document.getElementById('totalVisits').textContent = analyticsData.total_visits;
            document.getElementById('activeUsers').textContent = analyticsData.active_users_24h;
            document.getElementById('todayVisits').textContent = analyticsData.today_stats.visits || 0;

            // Update recent logins
            updateRecentLogins();

            // Update daily stats
            updateDailyStats();

            // Update users list
            updateUsersList();
        }

        function updateRecentLogins() {
            const container = document.getElementById('recentLogins');
            const logins = analyticsData.recent_logins || [];

            if (logins.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">No recent login activity</p>';
                return;
            }

            container.innerHTML = logins.map(login => {
                const date = new Date(login.timestamp);
                const timeAgo = getTimeAgo(date);
                const statusIcon = login.success ? 
                    '<i class="fas fa-check-circle" style="color: #4CAF50;"></i>' : 
                    '<i class="fas fa-times-circle" style="color: #f44336;"></i>';

                return `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;">
                        <div>
                            <strong>${login.email}</strong>
                            <br>
                            <small style="color: #666;">${timeAgo}</small>
                        </div>
                        <div>${statusIcon}</div>
                    </div>
                `;
            }).join('');
        }

        function updateDailyStats() {
            const container = document.getElementById('dailyStats');
            const dailyStats = analyticsData.daily_stats || {};
            const dates = Object.keys(dailyStats).sort().slice(-7); // Last 7 days

            if (dates.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">No daily statistics available</p>';
                return;
            }

            container.innerHTML = dates.map(date => {
                const stats = dailyStats[date];
                return `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;">
                        <div>
                            <strong>${new Date(date).toLocaleDateString()}</strong>
                        </div>
                        <div style="text-align: right;">
                            <div style="color: #4CAF50;">${stats.visits} visits</div>
                            <div style="color: #2196F3; font-size: 0.9em;">${stats.unique_users} users</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateUsersList() {
            const container = document.getElementById('usersList');
            const users = analyticsData.active_users || [];

            if (users.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">No active users in the last 24 hours</p>';
                return;
            }

            container.innerHTML = users.map(user => {
                const lastSeen = new Date(user.last_seen);
                const timeAgo = getTimeAgo(lastSeen);
                const isOnline = (new Date() - lastSeen) < 30 * 60 * 1000; // 30 minutes
                const initial = user.email.charAt(0).toUpperCase();

                return `
                    <div class="user-item">
                        <div class="user-info">
                            <div class="user-avatar">${initial}</div>
                            <div class="user-details">
                                <h4>${user.email}</h4>
                                <p>Last seen: ${timeAgo}</p>
                            </div>
                        </div>
                        <div class="user-status ${isOnline ? 'status-online' : 'status-offline'}">
                            ${isOnline ? 'Online' : 'Offline'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getTimeAgo(date) {
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);

            if (diffInSeconds < 60) return 'Just now';
            if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)} minutes ago`;
            if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)} hours ago`;
            return `${Math.floor(diffInSeconds / 86400)} days ago`;
        }

        // Load analytics on page load
        document.addEventListener('DOMContentLoaded', loadAnalytics);

        // Auto-refresh every 30 seconds
        setInterval(loadAnalytics, 30000);
    </script>
</body>
</html>
