<!DOCTYPE html>
<html>
<head>
  <title>Payment - Smart Bus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
  <style>
    body { 
      font-family: 'Segoe UI', sans-serif; 
      padding: 20px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    
    .content {
      padding: 40px;
    }
    
    .amount-display {
      background: linear-gradient(135deg, #f8fff8, #e8f5e8);
      border: 3px solid #4CAF50;
      border-radius: 15px;
      padding: 30px;
      margin: 30px 0;
      text-align: center;
    }
    
    .amount-value {
      font-size: 3em;
      font-weight: bold;
      color: #4CAF50;
    }
    
    .pass-details {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e1e5e9;
    }
    
    .qr-section {
      background: white;
      border: 2px solid #4CAF50;
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      margin: 25px 0;
    }
    
    .qr-code {
      margin: 20px auto;
      padding: 15px;
      background: white;
      border: 3px solid #4CAF50;
      border-radius: 10px;
      display: inline-block;
    }
    
    .divider {
      text-align: center;
      margin: 25px 0;
      position: relative;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #ddd;
    }
    
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    
    .divider span {
      background: white;
      padding: 0 15px;
      color: #666;
      font-weight: 500;
    }
    
    .upi-section {
      background: #f8f9fa;
      border: 2px solid #4CAF50;
      border-radius: 15px;
      padding: 25px;
      margin: 25px 0;
    }
    
    .input-group {
      margin: 15px 0;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    
    .input-group input {
      width: 100%;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
    }
    
    .pay-btn {
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      padding: 18px;
      border: none;
      font-size: 18px;
      cursor: pointer;
      border-radius: 12px;
      font-weight: bold;
      width: 100%;
      margin-top: 20px;
    }
    
    .pay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
    }
    
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    
    .loading-overlay.active {
      display: flex;
    }
    
    .loading-content {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
    }
    
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4CAF50;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2><i class="fas fa-credit-card"></i> Razorpay Payment</h2>
      <p>Pay with UPI - QR Code or UPI ID</p>
    </div>
    
    <div class="content">
      <div class="amount-display">
        <div style="font-size: 16px; color: #2e7d32; margin-bottom: 10px;">Amount to Pay</div>
        <div class="amount-value">₹<span id="totalAmount">0</span></div>
      </div>

      <div class="pass-details">
        <div class="detail-row">
          <strong>Pass Type:</strong>
          <span id="passType">Loading...</span>
        </div>
        <div class="detail-row">
          <strong>Route:</strong>
          <span id="route">Loading...</span>
        </div>
        <div class="detail-row" style="border-bottom: none;">
          <strong>Distance:</strong>
          <span id="distance">-</span>
        </div>
      </div>

      <!-- QR Code Section -->
      <div class="qr-section">
        <h3><i class="fas fa-qrcode"></i> Scan QR Code with Any UPI App</h3>
        <div id="qrcode" class="qr-code"></div>
        <p style="color: #666; margin-top: 15px;">PhonePe • Google Pay • Paytm • BHIM</p>
      </div>

      <button class="pay-btn" onclick="processRazorpayPayment()">
        <i class="fas fa-check-circle"></i> Verify and Pay with Razorpay
      </button>

      <div style="background: #e8f5e8; border: 2px solid #4CAF50; border-radius: 10px; padding: 12px; text-align: center; margin-top: 20px;">
        <i class="fas fa-shield-alt"></i>
        <strong>100% Secure</strong> • Powered by Razorpay
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <h3 id="loadingTitle">Processing Payment...</h3>
      <p id="loadingMessage">Please wait</p>
    </div>
  </div>

  <script>
    let paymentData = {};

    document.addEventListener('DOMContentLoaded', function() {
      console.log('💳 Razorpay Custom UI Payment loading...');
      loadPaymentData();
      generateQRCode();
    });

    function loadPaymentData() {
      const selectedPass = localStorage.getItem('selectedPass') || 'Daily Pass';
      const selectedPrice = localStorage.getItem('selectedPrice') || '₹75';
      const selectedRoute = localStorage.getItem('selectedRoute') || 'Route not selected';
      const routeDistance = localStorage.getItem('routeDistance') || '0';
      const calculatedFare = localStorage.getItem('calculatedFare');
      
      let finalPrice = selectedPrice;
      if (calculatedFare && calculatedFare !== 'null') {
        finalPrice = `₹${calculatedFare}`;
      }
      
      const numericPrice = parseInt(finalPrice.replace('₹', '').replace(',', '')) || 75;
      
      document.getElementById('totalAmount').textContent = numericPrice;
      document.getElementById('passType').textContent = selectedPass;
      document.getElementById('route').textContent = selectedRoute;
      document.getElementById('distance').textContent = routeDistance > 0 ? `${routeDistance} km` : '-';
      
      paymentData = {
        amount: numericPrice,
        passType: selectedPass,
        route: selectedRoute,
        distance: routeDistance,
        userEmail: localStorage.getItem('userEmail') || '',
        userName: localStorage.getItem('userName') || 'Passenger'
      };
      
      console.log('✅ Payment data loaded:', paymentData);
    }

    function generateQRCode() {
      const upiString = `upi://pay?pa=8340927497@ibl&pn=Lingam Manoj Kumar&am=${paymentData.amount}&cu=INR&tn=Smart Bus Pass`;
      
      new QRCode(document.getElementById("qrcode"), {
        text: upiString,
        width: 200,
        height: 200,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
    }

    function processRazorpayPayment() {
      console.log('🔄 Creating Razorpay order');
      showLoading('Creating Payment Order...', 'Connecting to Razorpay');

      fetch('/create-razorpay-order', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          amount: paymentData.amount,
          pass_type: paymentData.passType,
          route: paymentData.route,
          distance: paymentData.distance,
          user_email: paymentData.userEmail,
          user_name: paymentData.userName
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          console.log('✅ Razorpay order created');
          openRazorpayWithUPI(data);
        } else {
          throw new Error(data.error || 'Failed to create order');
        }
      })
      .catch(error => {
        console.error('❌ Error:', error);
        hideLoading();
        alert('Payment initialization failed: ' + error.message);
      });
    }

    function openRazorpayWithUPI(orderData) {
      hideLoading();
      
      const options = {
        key: orderData.key_id,
        amount: orderData.amount,
        currency: orderData.currency,
        name: orderData.merchant_name,
        description: `${paymentData.passType} - ${paymentData.route}`,
        order_id: orderData.order_id,
        prefill: {
          name: orderData.prefill.name,
          email: orderData.prefill.email,
          contact: orderData.prefill.contact
        },
        theme: {
          color: '#4CAF50'
        },
        handler: function(response) {
          console.log('✅ Payment successful');
          verifyPayment(response);
        },
        modal: {
          ondismiss: function() {
            console.log('❌ Payment cancelled');
          }
        }
      };

      const rzp = new Razorpay(options);
      rzp.open();
    }

    function verifyPayment(response) {
      showLoading('Verifying Payment...', 'Please wait');
      
      fetch('/verify-razorpay-payment', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          razorpay_order_id: response.razorpay_order_id,
          razorpay_payment_id: response.razorpay_payment_id,
          razorpay_signature: response.razorpay_signature,
          pass_type: paymentData.passType,
          amount: paymentData.amount,
          route: paymentData.route,
          distance: paymentData.distance,
          user_email: paymentData.userEmail,
          user_name: paymentData.userName
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          showSuccess();
        } else {
          throw new Error(data.error || 'Verification failed');
        }
      })
      .catch(error => {
        hideLoading();
        alert('Payment verification failed: ' + error.message);
      });
    }

    function showLoading(title, message) {
      document.getElementById('loadingTitle').textContent = title;
      document.getElementById('loadingMessage').textContent = message;
      document.getElementById('loadingOverlay').classList.add('active');
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').classList.remove('active');
    }

    function showSuccess() {
      document.getElementById('loadingOverlay').innerHTML = `
        <div class="loading-content">
          <div style="color: #4CAF50; font-size: 5em; margin-bottom: 20px;">
            <i class="fas fa-check-circle"></i>
          </div>
          <h2 style="color: #4CAF50;">Payment Successful!</h2>
          <p>Your Smart Bus Pass is now active</p>
          <p style="color: #999; margin-top: 20px;">Redirecting...</p>
        </div>
      `;
      
      localStorage.removeItem('userPasses');
      
      setTimeout(() => {
        window.location.href = '/dashboard?payment=success';
      }, 3000);
    }
  </script>
</body>
</html>
