<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google OAuth Debug Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-btn {
            background: #4285f4;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }
        .test-btn:hover {
            background: #357ae8;
        }
        #console {
            background: #f5f5f5;
            border: 1px solid #ddd;
            padding: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log {
            margin: 5px 0;
            padding: 5px;
        }
        .log.info {
            color: #0066cc;
        }
        .log.success {
            color: #00aa00;
        }
        .log.error {
            color: #cc0000;
        }
    </style>
</head>
<body>
    <h1>🔍 Google OAuth Debug Test</h1>
    
    <p>This page will help us see exactly what's happening with Google login.</p>
    
    <button class="test-btn" onclick="testGoogleOAuth()">🧪 Test Google OAuth Popup</button>
    <button class="test-btn" onclick="clearConsole()">🗑️ Clear Console</button>
    
    <h3>Debug Console:</h3>
    <div id="console"></div>

    <script>
        const consoleDiv = document.getElementById('console');
        
        function log(message, type = 'info') {
            const logEntry = document.createElement('div');
            logEntry.className = `log ${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleDiv.appendChild(logEntry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            console.log(message);
        }
        
        function clearConsole() {
            consoleDiv.innerHTML = '';
        }
        
        function testGoogleOAuth() {
            log('🚀 Starting Google OAuth test...', 'info');
            
            const clientId = '860458258411-922v35iverv84dui6bg3f9tk7gcu9hqg.apps.googleusercontent.com';
            const redirectUri = window.location.origin + '/google-callback';
            const scope = 'email profile';
            
            log(`📍 Current origin: ${window.location.origin}`, 'info');
            log(`🔗 Redirect URI: ${redirectUri}`, 'info');
            log(`🔑 Client ID: ${clientId}`, 'info');
            
            // Build OAuth URL
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
                `client_id=${clientId}&` +
                `redirect_uri=${encodeURIComponent(redirectUri)}&` +
                `response_type=token id_token&` +
                `scope=${encodeURIComponent(scope)}&` +
                `nonce=${Date.now()}`;
            
            log('🔗 Opening OAuth popup...', 'info');
            log(`Full URL: ${authUrl.substring(0, 100)}...`, 'info');
            
            // Open popup
            const popup = window.open(authUrl, 'GoogleLogin', 'width=500,height=600');
            
            if (!popup || popup.closed) {
                log('❌ Popup was blocked! Please allow popups for this site.', 'error');
                return;
            }
            
            log('✅ Popup opened successfully', 'success');
            
            // Listen for messages from popup
            window.addEventListener('message', function(event) {
                log(`📨 Received message from: ${event.origin}`, 'info');
                
                // Security check
                if (event.origin !== window.location.origin) {
                    log(`⚠️ Message from different origin, ignoring`, 'error');
                    return;
                }
                
                if (event.data.type === 'GOOGLE_LOGIN_SUCCESS') {
                    log('✅ Google login data received!', 'success');
                    log(`📧 Email: ${event.data.email}`, 'success');
                    log(`👤 Name: ${event.data.name}`, 'success');
                    
                    // Send to backend
                    log('📤 Sending to backend /google-login...', 'info');
                    
                    const formData = new FormData();
                    formData.append('email', event.data.email);
                    formData.append('name', event.data.name);
                    formData.append('google_id', 'test_' + Date.now());
                    
                    fetch('/google-login', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => {
                        log(`✅ Backend response: ${response.status}`, 'success');
                        log('🎯 Should navigate to /passes now', 'success');
                        
                        // Show what would happen
                        log('⏰ In real app, would navigate to: /passes', 'info');
                        log('✅ TEST COMPLETE - Google OAuth is working!', 'success');
                    })
                    .catch(error => {
                        log(`❌ Backend error: ${error}`, 'error');
                    });
                }
            });
            
            // Check if popup was closed
            const checkPopup = setInterval(() => {
                if (popup.closed) {
                    clearInterval(checkPopup);
                    log('🔒 Popup was closed', 'info');
                }
            }, 1000);
        }
        
        // Log initial state
        log('✅ Debug page loaded', 'success');
        log(`📍 Running on: ${window.location.href}`, 'info');
        log('👆 Click "Test Google OAuth Popup" button to start', 'info');
    </script>
</body>
</html>
