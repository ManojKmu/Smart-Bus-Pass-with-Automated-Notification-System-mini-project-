<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Pass - TSRTC Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-5px);
        }

        .passes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 30px;
        }

        /* TSRTC Ticket Style */
        .ticket-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            position: relative;
            transition: all 0.3s ease;
        }

        .ticket-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* Ticket Holes */
        .ticket-container::before,
        .ticket-container::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .ticket-container::before {
            left: -15px;
        }

        .ticket-container::after {
            right: -15px;
        }

        /* Ticket Header - Pink/Green Pattern like TSRTC */
        .ticket-header {
            background: linear-gradient(135deg, #ffc0cb 0%, #ffb6c1 50%, #98fb98 50%, #90ee90 100%);
            padding: 20px;
            position: relative;
            border-bottom: 3px dashed #666;
        }

        .ticket-logo {
            position: absolute;
            top: 10px;
            right: 20px;
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: #4CAF50;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .ticket-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .ticket-subtitle {
            font-size: 1em;
            color: #555;
            font-weight: 600;
        }

        .ticket-id {
            position: absolute;
            top: 10px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #333;
            font-size: 0.9em;
        }

        /* Ticket Body */
        .ticket-body {
            padding: 25px;
            background: white;
        }

        .ticket-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-item {
            border-left: 3px solid #4CAF50;
            padding-left: 15px;
        }

        .info-label {
            font-size: 0.85em;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1em;
            color: #333;
            font-weight: bold;
        }

        .route-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 2px solid #e9ecef;
        }

        .route-title {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .route-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .route-point {
            flex: 1;
            text-align: center;
        }

        .route-point-label {
            font-size: 0.75em;
            color: #666;
            margin-bottom: 5px;
        }

        .route-point-value {
            font-size: 1em;
            font-weight: bold;
            color: #333;
        }

        .route-arrow {
            font-size: 1.5em;
            color: #4CAF50;
        }

        /* QR Code Section */
        .qr-section {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 20px 0;
        }

        .qr-code {
            width: 120px;
            height: 120px;
            margin: 0 auto 10px auto;
            background: white;
            border: 3px solid #e91e63;
            border-radius: 10px;
            padding: 5px;
        }

        .qr-code img {
            width: 100%;
            height: 100%;
            display: block;
        }

        .qr-label {
            font-size: 0.9em;
            color: #666;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* Validity Badge */
        .validity-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .validity-badge.active {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .validity-badge.expired {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .validity-badge.expiring {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }

        /* Action Buttons */
        .ticket-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-share {
            background: #2196F3;
            color: white;
        }

        .btn-renew {
            background: #ff9800;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Government Stamp Watermark - Centered and Visible */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            opacity: 0.25;
            z-index: 1;
            pointer-events: none;
        }

        .stamp-circle {
            width: 200px;
            height: 200px;
            border: 8px solid #e91e63;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.3);
        }

        .stamp-emblem {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .stamp-text {
            font-size: 14px;
            font-weight: bold;
            color: #e91e63;
            text-align: center;
            line-height: 1.2;
        }

        /* No Passes Message */
        .no-passes {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .no-passes i {
            font-size: 5em;
            color: #ddd;
            margin-bottom: 20px;
        }

        .no-passes h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .no-passes p {
            color: #666;
            margin-bottom: 25px;
        }

        .buy-pass-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .buy-pass-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .passes-grid {
                grid-template-columns: 1fr;
            }

            .ticket-info-grid {
                grid-template-columns: 1fr;
            }

            .ticket-title {
                font-size: 1.3em;
            }

            .ticket-logo {
                width: 60px;
                height: 60px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/passes" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Passes List
        </a>

        <div class="header">
            <h1><i class="fas fa-ticket-alt"></i> My Bus Passes</h1>
            <p>TSRTC Style Digital Pass</p>
        </div>

        <div id="passesContainer" class="passes-grid">
            <!-- Passes will be loaded here -->
        </div>

        <div id="noPassesMessage" class="no-passes" style="display: none;">
            <i class="fas fa-ticket-alt"></i>
            <h3>No Passes Found</h3>
            <p>You haven't purchased any passes yet. Buy your first pass to get started!</p>
            <a href="/dashboard" class="buy-pass-btn">
                <i class="fas fa-plus"></i> Buy Your First Pass
            </a>
        </div>
    </div>

    <script>
        // Load user data and passes
        document.addEventListener('DOMContentLoaded', function() {
            loadUserPasses();
        });

        function loadUserPasses() {
            const userEmail = localStorage.getItem('userEmail');
            
            if (!userEmail) {
                console.log('⚠️ No email found, redirecting to login');
                window.location.href = '/';
                return;
            }

            console.log('📧 Loading passes for:', userEmail);

            // Fetch passes from backend
            fetch(`/get-user-passes/${encodeURIComponent(userEmail)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.passes.length > 0) {
                        console.log(`✅ Loaded ${data.passes.length} passes`);
                        displayPasses(data.passes);
                    } else {
                        showNoPassesMessage();
                    }
                })
                .catch(error => {
                    console.error('❌ Error loading passes:', error);
                    showNoPassesMessage();
                });
        }

        function displayPasses(passes) {
            const container = document.getElementById('passesContainer');
            const noPassesMsg = document.getElementById('noPassesMessage');
            
            container.innerHTML = '';
            container.style.display = 'grid';
            noPassesMsg.style.display = 'none';

            // Get user data from localStorage
            const userName = localStorage.getItem('userName') || 'Passenger';
            const userEmail = localStorage.getItem('userEmail') || '';

            passes.forEach(pass => {
                const ticket = createTicket(pass, userName, userEmail);
                container.appendChild(ticket);
            });
        }

        function createTicket(pass, userName, userEmail) {
            const now = new Date();
            const expiryDate = new Date(pass.expiryDate);
            const purchaseDate = new Date(pass.purchaseDate);
            const daysRemaining = Math.ceil((expiryDate - now) / (1000 * 60 * 60 * 24));
            
            let validityClass = 'active';
            let validityText = 'VALID';
            
            if (daysRemaining < 0) {
                validityClass = 'expired';
                validityText = 'EXPIRED';
            } else if (daysRemaining <= 7) {
                validityClass = 'expiring';
                validityText = `EXPIRES IN ${daysRemaining} DAYS`;
            }

            // Extract route information
            const routeParts = pass.route ? pass.route.split('→') : ['', ''];
            const pickup = routeParts[0]?.trim() || 'Any Location';
            const dropoff = routeParts[1]?.trim() || 'Any Location';

            const ticket = document.createElement('div');
            ticket.className = 'ticket-container';
            ticket.innerHTML = `
                <!-- Government Stamp Watermark -->
                <div class="watermark">
                    <div class="stamp-circle">
                        <div class="stamp-emblem">🏛️</div>
                        <div class="stamp-text">
                            GOVERNMENT OF<br>
                            TELANGANA<br>
                            TSRTC<br>
                            AUTHORIZED
                        </div>
                    </div>
                </div>
                
                <div class="ticket-header">
                    <div class="ticket-id">ID: ${pass.id || 'N/A'}</div>
                    <div class="ticket-logo">
                        <i class="fas fa-bus"></i>
                    </div>
                    <div class="ticket-title">TSRTC Road Pass</div>
                    <div class="ticket-subtitle">Telangana State Road Transport Corporation</div>
                </div>

                <div class="ticket-body">
                    <!-- Passenger Information -->
                    <div class="ticket-info-grid">
                        <div class="info-item">
                            <div class="info-label">Passenger Name</div>
                            <div class="info-value">${userName}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Pass Type</div>
                            <div class="info-value">${pass.type}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Ticket No</div>
                            <div class="info-value">${pass.id || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Amount</div>
                            <div class="info-value">${pass.price}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Issue Date</div>
                            <div class="info-value">${purchaseDate.toLocaleDateString('en-IN')}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Valid Until</div>
                            <div class="info-value">${expiryDate.toLocaleDateString('en-IN')}</div>
                        </div>
                    </div>

                    <!-- Route Information -->
                    <div class="route-section">
                        <div class="route-title">Journey Route</div>
                        <div class="route-details">
                            <div class="route-point">
                                <div class="route-point-label">FROM</div>
                                <div class="route-point-value">${pickup}</div>
                            </div>
                            <div class="route-arrow">
                                <i class="fas fa-arrow-right"></i>
                            </div>
                            <div class="route-point">
                                <div class="route-point-label">TO</div>
                                <div class="route-point-value">${dropoff}</div>
                            </div>
                        </div>
                        ${pass.distance ? `
                            <div style="text-align: center; margin-top: 10px; color: #666; font-size: 0.9em;">
                                <i class="fas fa-road"></i> Distance: ${pass.distance} km
                            </div>
                        ` : ''}
                    </div>

                    <!-- QR Code Section -->
                    <div class="qr-section">
                        <div class="qr-label">SCAN QR CODE</div>
                        <div class="qr-code">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=http://localhost:5000" alt="QR Code">
                        </div>
                        <div style="font-size: 0.85em; color: #666; margin-bottom: 10px;">Visit Smart Bus Portal</div>
                        <div class="validity-badge ${validityClass}">
                            <i class="fas fa-${validityClass === 'active' ? 'check-circle' : validityClass === 'expired' ? 'times-circle' : 'exclamation-triangle'}"></i>
                            ${validityText}
                        </div>
                    </div>

                    <!-- Additional Info -->
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 15px;">
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; font-size: 0.85em;">
                            <div>
                                <strong>Email:</strong><br>
                                <span style="color: #666;">${userEmail}</span>
                            </div>
                            <div>
                                <strong>Payment Method:</strong><br>
                                <span style="color: #666;">${pass.paymentMethod || 'UPI'}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="ticket-actions">
                        <button class="action-btn btn-download" onclick="downloadTicket('${pass.id}')">
                            <i class="fas fa-download"></i> Download
                        </button>
                        <button class="action-btn btn-share" onclick="shareTicket('${pass.id}')">
                            <i class="fas fa-share-alt"></i> Share
                        </button>
                        ${daysRemaining <= 7 && daysRemaining >= 0 ? `
                            <button class="action-btn btn-renew" onclick="renewPass('${pass.id}')">
                                <i class="fas fa-refresh"></i> Renew
                            </button>
                        ` : ''}
                    </div>

                    <!-- Footer -->
                    <div style="text-align: center; margin-top: 20px; padding-top: 15px; border-top: 2px dashed #ddd; font-size: 0.8em; color: #666;">
                        <p><strong>TSRTC Customer Care:</strong> 040-23450033</p>
                        <p>This is a computer-generated pass. No signature required.</p>
                    </div>
                </div>
            `;

            // Generate QR code after element is added to DOM
            setTimeout(() => {
                generateQRCode(pass.id, pass);
            }, 100);

            return ticket;
        }

        function generateQRCode(passId, passData) {
            // Create QR code data
            const qrData = `TSRTC-PASS:${passId}|${passData.type}|${passData.expiryDate}`;
            
            // For now, just show the QR icon (you can integrate a real QR library later)
            console.log('QR Code data:', qrData);
        }

        function downloadTicket(passId) {
            alert('Download functionality will open the ticket in a new window for printing/saving.');
            window.print();
        }

        function shareTicket(passId) {
            const passes = JSON.parse(localStorage.getItem('userPasses') || '[]');
            const pass = passes.find(p => p.id == passId);
            
            if (!pass) return;

            const shareText = `🎫 TSRTC Bus Pass\n\nPass Type: ${pass.type}\nValid Until: ${new Date(pass.expiryDate).toLocaleDateString()}\nAmount: ${pass.price}\n\nSmart Bus - Digital Pass System`;

            if (navigator.share) {
                navigator.share({
                    title: 'My Bus Pass',
                    text: shareText
                }).catch(err => console.log('Share cancelled'));
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(shareText).then(() => {
                    alert('Pass details copied to clipboard!');
                });
            }
        }

        function renewPass(passId) {
            if (confirm('Do you want to renew this pass?')) {
                window.location.href = '/renew-pass?passId=' + passId;
            }
        }

        function showNoPassesMessage() {
            document.getElementById('passesContainer').style.display = 'none';
            document.getElementById('noPassesMessage').style.display = 'block';
        }
    </script>
</body>
</html>
