<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login - Processing...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            color: #333;
            margin: 0 0 10px;
        }
        p {
            color: #666;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Processing Google Login...</h2>
        <p>Please wait while we complete your login</p>
    </div>

    <script>
        console.log('🔄 Google OAuth callback page loaded');
        
        // Parse the hash fragment to get the ID token
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const idToken = params.get('id_token');
        
        console.log('📦 Hash params:', hash);
        console.log('🔑 ID Token:', idToken ? 'Found' : 'Not found');
        
        if (idToken) {
            try {
                // Parse JWT token to get user info
                const tokenParts = idToken.split('.');
                const payload = JSON.parse(atob(tokenParts[1].replace(/-/g, '+').replace(/_/g, '/')));
                
                console.log('✅ User data extracted:', payload);
                
                const email = payload.email;
                const name = payload.name;
                const picture = payload.picture;
                
                // Store in localStorage
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', name);
                localStorage.setItem('userPicture', picture || '');
                
                console.log('💾 Stored in localStorage');
                
                // Send to backend
                const formData = new FormData();
                formData.append('email', email);
                formData.append('name', name);
                formData.append('google_id', 'oauth_' + Date.now());
                
                console.log('📤 Sending to backend...');
                
                fetch('/google-login', {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin'  // Ensure cookies are sent/received
                })
                .then(response => {
                    console.log('✅ Backend response:', response.status);
                    if (response.ok) {
                        return response.json();
                    }
                    throw new Error('Backend login failed');
                })
                .then(data => {
                    console.log('✅ Backend login successful:', data);
                    // Clear the hash to prevent re-processing
                    history.replaceState(null, null, ' ');
                    // Use replace instead of href to prevent back button issues
                    console.log('🎯 Redirecting to passes page...');
                    window.location.replace('/passes');
                })
                .catch(error => {
                    console.error('❌ Backend error:', error);
                    // Navigate anyway - user data is in localStorage
                    console.log('🎯 Redirecting to passes page anyway...');
                    history.replaceState(null, null, ' ');
                    window.location.replace('/passes');
                });
                
            } catch (error) {
                console.error('❌ Error parsing token:', error);
                document.querySelector('p').textContent = 'Error processing login. Redirecting...';
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            }
        } else {
            console.error('❌ No ID token found in URL');
            document.querySelector('p').textContent = 'Error: No login data received. Redirecting...';
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
    </script>
</body>
</html>
