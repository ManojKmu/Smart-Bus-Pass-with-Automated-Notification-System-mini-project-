<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Pass Expiry System - Smart Bus</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #4CAF50;
    }

    .test-section {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      border-left: 4px solid #4CAF50;
    }

    .btn {
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      margin: 10px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
    }

    .btn-warning {
      background: linear-gradient(135deg, #ff9800, #f57c00);
    }

    .btn-danger {
      background: linear-gradient(135deg, #f44336, #d32f2f);
    }

    .btn-info {
      background: linear-gradient(135deg, #2196F3, #1976D2);
    }

    .result {
      background: #e8f5e8;
      border: 1px solid #4CAF50;
      color: #2e7d32;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      display: none;
    }

    .error {
      background: #ffebee;
      border: 1px solid #f44336;
      color: #c62828;
    }

    .info {
      background: #e3f2fd;
      border: 1px solid #2196F3;
      color: #1565c0;
    }

    .pass-list {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin: 15px 0;
    }

    .pass-item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pass-item:last-child {
      border-bottom: none;
    }

    .pass-status {
      padding: 5px 10px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: bold;
    }

    .status-active {
      background: #e8f5e8;
      color: #2e7d32;
    }

    .status-expiring {
      background: #fff3e0;
      color: #f57c00;
    }

    .status-expired {
      background: #ffebee;
      color: #c62828;
    }

    .notification-item {
      background: #f8f9fa;
      border-left: 4px solid #2196F3;
      padding: 15px;
      margin: 10px 0;
      border-radius: 0 8px 8px 0;
    }

    .notification-title {
      font-weight: bold;
      color: #1976D2;
      margin-bottom: 5px;
    }

    .notification-message {
      color: #666;
      font-size: 14px;
    }

    .notification-date {
      color: #999;
      font-size: 12px;
      margin-top: 5px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
